name: build-release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-targets

  build-artifacts:
    name: build artifact (${{ matrix.name }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: jira-cli-darwin-arm64
            bin: jira-cli
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: jira-cli-linux-x86_64
            bin: jira-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Collect artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "${{ matrix.name }}"
          chmod +x "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    name: github release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          find dist -type f -maxdepth 2 -print -exec cp {} . \;

      - name: Checksums
        run: |
          shasum -a 256 jira-cli-darwin-arm64 jira-cli-linux-x86_64 > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jira-cli-darwin-arm64
            jira-cli-linux-x86_64
            checksums.txt
